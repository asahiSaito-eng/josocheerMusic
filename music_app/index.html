<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jmusic</title>
    
    <!-- PWA用設定 -->
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="img/iconcheer.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .player-view { 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
        }

        /* --- Apple Music風 モダンシークバー --- */
        .seek-container {
            position: relative;
            height: 28px; /* タッチしやすい高さを確保 */
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        /* 背景トラック */
        .seek-track-bg {
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 進行状況バー */
        .seek-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: #fff;
            border-radius: 4px;
            pointer-events: none;
        }

        /* 見えないネイティブスライダー（操作用） */
        input[type="range"] { 
            -webkit-appearance: none; 
            appearance: none; 
            background: transparent; 
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 10;
            margin: 0;
            cursor: pointer;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { 
            width: 100%; height: 100%; background: transparent; border: none; 
        }
        /* ツマミ（丸）を透明にして隠す */
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            appearance: none; 
            height: 28px; 
            width: 28px; 
            border-radius: 50%; 
            background: transparent; 
            cursor: pointer;
        }

        /* ループ範囲の薄い赤帯 */
        #loop-visual-bar {
            position: absolute;
            height: 6px;
            background: rgba(239, 68, 68, 0.35); /* Tailwind red-500 薄め */
            border-radius: 3px;
            z-index: 5;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ループの赤い縦線マーカー */
        .loop-marker {
            position: absolute;
            width: 3px;
            height: 14px;
            background: #ef4444; /* Tailwind red-500 */
            border-radius: 2px;
            z-index: 6;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.2s ease;
            box-shadow: 0 0 6px rgba(0,0,0,0.6);
        }

        /* 操作時（ドラッグ時）にバーを少し太くする演出 */
        .seek-container:active .seek-track-bg,
        .seek-container:active #loop-visual-bar {
            transform: translateY(-50%) scaleY(1.4);
        }
        .seek-container:active .loop-marker {
            transform: translate(-50%, -50%) scaleY(1.2);
        }
        /* --------------------------------- */

        .active-song-item {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #ef4444;
        }

        /* Apple Musicスタイルのフッターアイコン */
        .footer-icon-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-icon-btn:active {
            transform: scale(0.9);
            opacity: 0.6;
        }

        .control-btn {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .control-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* スクロールバー非表示 (Queue画面用) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

        function onQueueButtonClick() {

        function toggleQueueView(show) {
            const queueView = document.getElementById('queue-view');
            const queueBtn = document.getElementById('btn-queue-toggle');
            
            if (show) {
                renderQueueList();
                queueView.style.transform = "translateY(0)";
                if(queueBtn) {
                    queueBtn.classList.add('text-white');
                    queueBtn.classList.remove('text-white/40');
                }
            } else {
                queueView.style.transform = "translateY(100%)";
                if(queueBtn) {
                    queueBtn.classList.remove('text-white');
                    queueBtn.classList.add('text-white/40');
                }
            }
        }

        function renderQueueList() {
            const container = document.getElementById('queue-list');
            container.innerHTML = '';
            
            tracks.forEach((t, i) => {
                const isActive = (i === currentIdx);
                const div = document.createElement('div');
                div.id = `queue-item-${i}`;
                
                div.className = `flex items-center gap-4 py-3 px-3 rounded-xl cursor-pointer transition-all ${
                    isActive 
                    ? 'bg-white/10 border-l-4 border-red-500' 
                    : 'hover:bg-white/5 active:bg-white/10 border-l-4 border-transparent'
                }`;
                
                div.onclick = () => {
                    playTrack(i);
                    // ここで自動で閉じないように toggleQueueView(false) を削除
                };
                
                div.innerHTML = `
                    <div class="w-10 h-10 relative flex-shrink-0">
                        <img src="${t.img}" class="w-full h-full rounded shadow-md object-cover">
                        ${isActive ? `
                        <div class="absolute inset-0 bg-black/40 rounded flex items-center justify-center">

                        </div>
                        ` : ''}

                        <div class="text-[11px] truncate ${isActive ? 'text-white/70' : 'text-white/40'}">${t.artist}</div>
                    </div>
                `;
                container.appendChild(div);
            });

                setTimeout(() => {
                    const activeItem = document.getElementById(`queue-item-${currentIdx}`);
                    if (activeItem) {
                        activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
        }

                    <img src="${t.img}" class="w-10 h-10 rounded object-cover shadow-lg">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold truncate">${t.title}</div>
                        <div class="text-[10px] text-white/40">${t.artist}</div>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function playTrack(idx) {
            if (idx === currentIdx && !audio.paused) return;
            
            if (currentIdx !== -1) {
                const prevSongItem = document.getElementById(`song-item-${currentIdx}`);
                if (prevSongItem) prevSongItem.classList.remove('active-song-item');
            }

            currentIdx = idx;
            const t = tracks[idx];
            audio.src = t.src;
            
            const newSongItem = document.getElementById(`song-item-${idx}`);
            if (newSongItem) newSongItem.classList.add('active-song-item');
            
            document.getElementById('mini-title').innerText = t.title;
            document.getElementById('full-title').innerText = t.title;
            document.getElementById('mini-artist').innerText = t.artist;
            document.getElementById('full-artist').innerText = t.artist;
            document.getElementById('mini-img').src = t.img;
            document.getElementById('full-img').src = t.img;
            document.getElementById('bg-blur').style.backgroundColor = t.color;
            
            // キュー画面上部のミニプレイヤーも更新
            document.getElementById('queue-mini-title').innerText = t.title;
            document.getElementById('queue-mini-artist').innerText = t.artist;
            document.getElementById('queue-mini-img').src = t.img;
            
            // シークバーの表示をリセット
            document.getElementById('seek-progress').style.width = '0%';
            document.getElementById('seek-bar').value = 0;

            resetLoopState(); 
            audio.play();
            updateMediaSession();
            updatePlayButtonIcons();

            const queueView = document.getElementById('queue-view');
            if (queueView.style.transform === "translateY(0px)" || queueView.style.transform === "translateY(0)") {
                renderQueueList();
            }
        }

        // --- ループ機能 ---
        function setLoopStart() {
            loopStartTime = audio.currentTime;
            isLooping = true;
            updateLoopUI();
        }

        function setLoopFinish() {
            if (loopStartTime === null) loopStartTime = 0;
            loopFinishTime = audio.currentTime;
            isLooping = true;
            if (loopFinishTime < loopStartTime) {
                [loopStartTime, loopFinishTime] = [loopFinishTime, loopStartTime];
            }
            updateLoopUI();
        }

        function toggleLoopMode() {
            if (isLooping) {
                resetLoopState();
            } else {
                isLooping = true;
            }
            updateLoopUI();
        }

        function resetLoopState() {
            isLooping = false;
            loopStartTime = null;
            loopFinishTime = null;
            updateLoopUI();
        }

        function updateLoopUI() {
            const btnToggle = document.getElementById('btn-loop-toggle');
            const btnStart = document.getElementById('btn-loop-start');
            const btnFinish = document.getElementById('btn-loop-finish');
            const indicator = document.getElementById('loop-indicator');
            const visualBar = document.getElementById('loop-visual-bar');
            const markerStart = document.getElementById('loop-marker-start');
            const markerFinish = document.getElementById('loop-marker-finish');

            btnToggle.classList.toggle('active', isLooping);
            btnStart.classList.toggle('active', loopStartTime !== null);
            btnFinish.classList.toggle('active', loopFinishTime !== null);

            if (isLooping) {
                indicator.style.opacity = "1";
                updateLoopVisualBar(); // マーカーとバーの配置更新
                if (loopStartTime !== null && loopFinishTime !== null) {
                    indicator.innerText = "A-B LOOP ACTIVE";
                } else {
                    indicator.innerText = "SINGLE TRACK LOOP ACTIVE";
                }
            } else {
                indicator.style.opacity = "0";
                visualBar.style.opacity = "0";
                markerStart.style.opacity = "0";
                markerFinish.style.opacity = "0";
            }
        }

        function updateLoopVisualBar() {
            const visualBar = document.getElementById('loop-visual-bar');
            const markerStart = document.getElementById('loop-marker-start');
            const markerFinish = document.getElementById('loop-marker-finish');

            if (audio.duration) {
                // START マーカー表示
                if (loopStartTime !== null) {
                    const startPercent = (loopStartTime / audio.duration) * 100;
                    markerStart.style.left = startPercent + "%";
                    markerStart.style.opacity = "1";
                } else {
                    markerStart.style.opacity = "0";
                }

                // FINISH マーカー表示
                if (loopFinishTime !== null) {
                    const endPercent = (loopFinishTime / audio.duration) * 100;
                    markerFinish.style.left = endPercent + "%";
                    markerFinish.style.opacity = "1";
                } else {
                    markerFinish.style.opacity = "0";
                }

                // 範囲の赤い帯表示
                if (loopStartTime !== null && loopFinishTime !== null) {
                    const startPercent = (loopStartTime / audio.duration) * 100;
                    const endPercent = (loopFinishTime / audio.duration) * 100;
                    visualBar.style.left = startPercent + "%";
                    visualBar.style.width = (endPercent - startPercent) + "%";
                    visualBar.style.opacity = "1";
                } else {
                    visualBar.style.opacity = "0";
                }
            }
        }

        audio.ontimeupdate = () => {
            if (currentIdx === -1) return;
            
            // ループ制御
            if (isLooping) {
                if (loopStartTime !== null && loopFinishTime !== null) {
                    if (audio.currentTime >= loopFinishTime) {
                        audio.currentTime = loopStartTime;
                    }
                } else {
                    if (audio.currentTime >= audio.duration - 0.2) {
                        audio.currentTime = 0;
                        audio.play();
                    }
                }
            }

            if (!isNaN(audio.duration)) {
                const bar = document.getElementById('seek-bar');
                bar.max = audio.duration;
                bar.value = audio.currentTime;
                
                // モダンプログレスバーの進捗表示更新
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('seek-progress').style.width = progressPercent + '%';

                document.getElementById('time-curr').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
                
                // 動的な更新が必要な場合（ロード直後など）
                if (isLooping) updateLoopVisualBar();
            }
        };

        audio.onplay = () => updatePlayButtonIcons();
        audio.onpause = () => updatePlayButtonIcons();
        audio.onended = () => {
            if (!isLooping) {
                handleNext();
            } else if (loopStartTime === null || loopFinishTime === null) {
                audio.currentTime = 0;
                audio.play();
            }
        };

        function handlePlayPause() {
            if (currentIdx === -1) { playTrack(0); return; }
            if (audio.paused) audio.play(); else audio.pause();
        }

        function updatePlayButtonIcons() {
            const miniIcon = document.getElementById('mini-play-btn');
            const fullIcon = document.getElementById('full-play-btn');
            const isPaused = audio.paused;
            miniIcon.className = isPaused ? "fas fa-play" : "fas fa-pause";
            fullIcon.className = isPaused ? "fas fa-play" : "fas fa-pause";
            document.getElementById('full-img').style.transform = isPaused ? "scale(0.85)" : "scale(1.0)";
        }

        function handleNext() { 
            playTrack((currentIdx + 1) % tracks.length); 
        }
        
        // 巻き戻しボタンの挙動を変更
        function handlePrev() { 
            if (currentIdx === -1) return;
            
            // 再生時間が5秒以上の場合は曲の先頭に戻る
            if (audio.currentTime >= 5.0) {
                audio.currentTime = 0;
            } else {
                // 5秒未満の場合は前の曲に戻る
                playTrack((currentIdx - 1 + tracks.length) % tracks.length); 
            }
        }
        
        function handleSeek(v) { 
            audio.currentTime = v; 
            if (!isNaN(audio.duration)) {
                const progressPercent = (v / audio.duration) * 100;
                document.getElementById('seek-progress').style.width = progressPercent + '%';
            }
        }

        function toggleFullPlayer(show) {
            const player = document.getElementById('full-player');
            const mini = document.getElementById('mini-player');
            player.style.transform = show ? "translateY(0)" : "translateY(100%)";
            mini.style.opacity = show ? "0" : "1";
            mini.style.pointerEvents = show ? "none" : "auto";
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' + sec : sec}`;
        }

        // スワイプイベントの設定
        function setupSwipeEvents() {
            function addSwipeListener(element, options) {
                let startX = 0;
                let startY = 0;
                let isTouching = false;

                element.addEventListener('touchstart', e => {
                    // シークバーやボタン上のスワイプは無視する
                    let target = e.target;
                    while (target && target !== element) {
                        if (target.tagName.toLowerCase() === 'button' || target.tagName.toLowerCase() === 'input') {
                            return;
                        }
                        target = target.parentNode;
                    }
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isTouching = true;
                }, { passive: true });

                element.addEventListener('touchend', e => {
                    if (!isTouching) return;
                    isTouching = false;
                    
                    let endX = e.changedTouches[0].clientX;
                    let endY = e.changedTouches[0].clientY;
                    
                    let diffX = endX - startX;
                    let diffY = endY - startY;
                    
                    let absDiffX = Math.abs(diffX);
                    let absDiffY = Math.abs(diffY);
                    
                    const threshold = 40; // スワイプ判定のしきい値
                    
                    if (Math.max(absDiffX, absDiffY) > threshold) {
                        if (absDiffX > absDiffY) {
                            // 横方向のスワイプ
                            if (diffX > 0 && options.onSwipeRight) options.onSwipeRight();
                            else if (diffX < 0 && options.onSwipeLeft) options.onSwipeLeft();
                        } else {
                            // 縦方向のスワイプ
                            if (diffY > 0 && options.onSwipeDown) options.onSwipeDown();
                            else if (diffY < 0 && options.onSwipeUp) options.onSwipeUp();
                        }
                    }
                });
            }

            // 1. 画面下部を上にスワイプでリスト表示
            const fullFooter = document.getElementById('full-footer');
            if (fullFooter) {
                addSwipeListener(fullFooter, {
                    onSwipeUp: () => toggleQueueView(true)
                });
            }

            // 2. フルプレーヤーを上から下にスワイプでミニプレイヤー化
            const fullPlayer = document.getElementById('full-player');
            if (fullPlayer) {
                addSwipeListener(fullPlayer, {
                    onSwipeDown: () => toggleFullPlayer(false)
                });
            }

            // 3. アートワーク(img)を右スワイプで次、左スワイプで前
            const fullImgContainer = document.getElementById('full-img-container');
            if (fullImgContainer) {
                addSwipeListener(fullImgContainer, {
                    onSwipeRight: () => handleNext(),
                    onSwipeLeft: () => handlePrev()
                });
            }

            // 4. ミニプレイヤーを右スワイプで次、左スワイプで前
            const miniPlayer = document.getElementById('mini-player');
            if (miniPlayer) {
                addSwipeListener(miniPlayer, {
                    onSwipeRight: () => handleNext(),
                    onSwipeLeft: () => handlePrev()
                });
            }
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const t = tracks[currentIdx];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.title,
                    artist: t.artist,
                    artwork: [{ src: t.img, sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => handlePlayPause());
                navigator.mediaSession.setActionHandler('pause', () => handlePlayPause());
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNext());
                navigator.mediaSession.setActionHandler('previoustrack', () => handlePrev());
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 登録成功:', reg.scope))
                    .catch(err => console.log('Service Worker 登録失敗:', err));
            });
        }

        window.onload = () => {
            initLibrary();
            setupSwipeEvents();
        };
    </script>
</body>
</html>
