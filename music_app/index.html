<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jmusic</title>
    
    <!-- PWA用設定 -->
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="img/iconcheer.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .player-view { 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
        }

        /* --- Apple Music風 モダンシークバー --- */
        .seek-container {
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .seek-track-bg {
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .seek-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: #fff;
            border-radius: 4px;
            pointer-events: none;
        }

        input[type="range"] { 
            -webkit-appearance: none; 
            appearance: none; 
            background: transparent; 
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 10;
            margin: 0;
            cursor: pointer;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { 
            width: 100%; height: 100%; background: transparent; border: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            appearance: none; 
            height: 28px; 
            width: 28px; 
            border-radius: 50%; 
            background: transparent; 
            cursor: pointer;
        }

        #loop-visual-bar {
            position: absolute;
            height: 6px;
            background: rgba(239, 68, 68, 0.35);
            border-radius: 3px;
            z-index: 5;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .loop-marker {
            position: absolute;
            width: 3px;
            height: 14px;
            background: #ef4444;
            border-radius: 2px;
            z-index: 6;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.2s ease;
            box-shadow: 0 0 6px rgba(0,0,0,0.6);
        }

        .seek-container:active .seek-track-bg,
        .seek-container:active #loop-visual-bar {
            transform: translateY(-50%) scaleY(1.4);
        }
        .seek-container:active .loop-marker {
            transform: translate(-50%, -50%) scaleY(1.2);
        }

        .active-song-item {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #ef4444;
        }

        .footer-icon-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-icon-btn:active {
            transform: scale(0.9);
            opacity: 0.6;
        }

        .control-btn {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .control-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex flex-col">

        <div id="song-list" class="space-y-1">

        </div>

            </div>
        </div>

        <!-- タイトルエリア -->
        <div class="mb-6">
            <div class="w-full">

                <p id="full-artist" class="text-xl text-white/50 truncate">アーティスト</p>
            </div>
            
            <div class="flex items-center justify-between mt-4">
                <div class="flex items-center gap-2">
                    <button id="btn-loop-toggle" onclick="toggleLoopMode()" class="control-btn">LOOP</button>
                    <button id="btn-loop-start" onclick="setLoopStart()" class="control-btn">START</button>
                    <button id="btn-loop-finish" onclick="setLoopFinish()" class="control-btn">FINISH</button>
                </div>
                <div id="loop-indicator" class="text-[9px] text-red-500 font-bold opacity-0 transition-opacity text-right">LOOP ACTIVE</div>
            </div>
        </div>

        <!-- 進捗バー -->
        <div class="mb-8">
            <div class="seek-container">
                <div class="seek-track-bg">
                    <div id="seek-progress" class="seek-progress"></div>
                </div>
                <div id="loop-visual-bar"></div>
                <div id="loop-marker-start" class="loop-marker"></div>
                <div id="loop-marker-finish" class="loop-marker"></div>
                <input type="range" id="seek-bar" class="w-full" value="0" step="0.1" oninput="handleSeek(this.value)">
            </div>
            <div class="flex justify-between text-[11px] font-bold text-white/30 mt-2">
                <span id="time-curr">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <!-- メインコントロール -->
        <!-- 下マージンを縮小 (mb-10 -> mb-6) -->
        <div class="flex justify-around items-center mb-6">
            <button onclick="handlePrev()" class="text-3xl active:scale-90 transition-transform"><i class="fas fa-backward"></i></button>
            <button onclick="handlePlayPause()" class="text-6xl w-24 active:scale-95 transition-transform"><i id="full-play-btn" class="fas fa-play"></i></button>
            <button onclick="forceNextTrack()" class="text-3xl active:scale-90 transition-transform"><i class="fas fa-forward"></i></button>

        let loopStartTime = null;

        function onLyricsButtonClick() { console.log("Lyrics feature"); }
        function onQueueButtonClick() { toggleQueueView(true); }

        function toggleQueueView(show) {
            const queueView = document.getElementById('queue-view');
            const queueBtn = document.getElementById('btn-queue-toggle');
            if (show) {
                renderQueueList();
                queueView.style.transform = "translateY(0)";
                if(queueBtn) { queueBtn.classList.add('text-white'); queueBtn.classList.remove('text-white/40'); }
            } else {
                queueView.style.transform = "translateY(100%)";
                if(queueBtn) { queueBtn.classList.remove('text-white'); queueBtn.classList.add('text-white/40'); }
            }
        }

        function renderQueueList() {
            const container = document.getElementById('queue-list');
            container.innerHTML = '';
            tracks.forEach((t, i) => {
                const isActive = (i === currentIdx);
                const div = document.createElement('div');
                div.id = `queue-item-${i}`;
                div.className = `flex items-center gap-4 py-3 px-3 rounded-xl cursor-pointer transition-all ${
                    isActive ? 'bg-white/10 border-l-4 border-red-500' : 'hover:bg-white/5 active:bg-white/10 border-l-4 border-transparent'
                }`;
                div.onclick = () => playTrack(i);
                div.innerHTML = `
                    <div class="w-10 h-10 relative flex-shrink-0">
                        <img src="${t.img}" class="w-full h-full rounded shadow-md object-cover" alt="cover">
                        ${isActive ? `
                        <div class="absolute inset-0 bg-black/40 rounded flex items-center justify-center">
                            <i class="fas fa-volume-up text-white text-xs"></i>
                        </div>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-semibold truncate ${isActive ? 'text-white' : 'text-white/80'}">${t.title}</div>
                        <div class="text-[11px] truncate ${isActive ? 'text-white/70' : 'text-white/40'}">${t.artist}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            if (currentIdx !== -1) {
                setTimeout(() => {
                    const activeItem = document.getElementById(`queue-item-${currentIdx}`);
                    if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        function initLibrary() {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            tracks.forEach((t, i) => {
                const div = document.createElement('div');
                div.id = `song-item-${i}`;
                div.className = "flex items-center gap-3 py-3 px-2 rounded-xl border-b border-white/5 active:bg-white/5 cursor-pointer transition-colors";
                div.onclick = () => {
                    playTrack(i);
                    toggleFullPlayer(true);
                };
                div.innerHTML = `
                    <img src="${t.img}" class="w-10 h-10 rounded object-cover shadow-lg" alt="cover">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold truncate">${t.title}</div>
                        <div class="text-[10px] text-white/40">${t.artist}</div>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function playTrack(idx) {
            if (idx === currentIdx && !audio.paused) return;
            
            if (currentIdx !== -1) {
                const prevSongItem = document.getElementById(`song-item-${currentIdx}`);
                if (prevSongItem) prevSongItem.classList.remove('active-song-item');
            }

            currentIdx = idx;
            const t = tracks[idx];
            audio.src = t.src;
            
            const newSongItem = document.getElementById(`song-item-${idx}`);
            if (newSongItem) newSongItem.classList.add('active-song-item');
            
            document.getElementById('mini-title').innerText = t.title;
            document.getElementById('full-title').innerText = t.title;
            document.getElementById('mini-artist').innerText = t.artist;
            document.getElementById('full-artist').innerText = t.artist;
            document.getElementById('mini-img').src = t.img;
            document.getElementById('full-img').src = t.img;
            document.getElementById('bg-blur').style.backgroundColor = t.color;
            
            document.getElementById('queue-mini-title').innerText = t.title;
            document.getElementById('queue-mini-artist').innerText = t.artist;
            document.getElementById('queue-mini-img').src = t.img;
            
            document.getElementById('seek-progress').style.width = '0%';
            document.getElementById('seek-bar').value = 0;

            resetLoopState(); 
            audio.play();
            updateMediaSession();
            updatePlayButtonIcons();

            const queueView = document.getElementById('queue-view');
            if (queueView.style.transform === "translateY(0px)" || queueView.style.transform === "translateY(0)") {
                renderQueueList();
            }
        }

        // --- ループ機能 ---
        function setLoopStart() { loopStartTime = audio.currentTime; isLooping = true; updateLoopUI(); }
        function setLoopFinish() {
            if (loopStartTime === null) loopStartTime = 0;
            loopFinishTime = audio.currentTime;
            isLooping = true;
            if (loopFinishTime < loopStartTime) [loopStartTime, loopFinishTime] = [loopFinishTime, loopStartTime];
            updateLoopUI();
        }
        function toggleLoopMode() {
            if (isLooping) resetLoopState();
            else isLooping = true;
            updateLoopUI();
        }
        function resetLoopState() {
            isLooping = false; loopStartTime = null; loopFinishTime = null; updateLoopUI();
        }
        function updateLoopUI() {
            const btnToggle = document.getElementById('btn-loop-toggle');
            const btnStart = document.getElementById('btn-loop-start');
            const btnFinish = document.getElementById('btn-loop-finish');
            const indicator = document.getElementById('loop-indicator');
            const visualBar = document.getElementById('loop-visual-bar');
            const markerStart = document.getElementById('loop-marker-start');
            const markerFinish = document.getElementById('loop-marker-finish');

            btnToggle.classList.toggle('active', isLooping);
            btnStart.classList.toggle('active', loopStartTime !== null);
            btnFinish.classList.toggle('active', loopFinishTime !== null);

            if (isLooping) {
                indicator.style.opacity = "1";
                updateLoopVisualBar();
                indicator.innerText = (loopStartTime !== null && loopFinishTime !== null) ? "A-B LOOP ACTIVE" : "SINGLE TRACK LOOP ACTIVE";
            } else {
                indicator.style.opacity = "0";
                visualBar.style.opacity = "0";
                markerStart.style.opacity = "0";
                markerFinish.style.opacity = "0";
            }
        }

        function updateLoopVisualBar() {
            const visualBar = document.getElementById('loop-visual-bar');
            const markerStart = document.getElementById('loop-marker-start');
            const markerFinish = document.getElementById('loop-marker-finish');

            if (audio.duration) {
                if (loopStartTime !== null) {
                    markerStart.style.left = (loopStartTime / audio.duration) * 100 + "%";
                    markerStart.style.opacity = "1";
                } else markerStart.style.opacity = "0";

                if (loopFinishTime !== null) {
                    markerFinish.style.left = (loopFinishTime / audio.duration) * 100 + "%";
                    markerFinish.style.opacity = "1";
                } else markerFinish.style.opacity = "0";

                if (loopStartTime !== null && loopFinishTime !== null) {
                    const startPercent = (loopStartTime / audio.duration) * 100;
                    const endPercent = (loopFinishTime / audio.duration) * 100;
                    visualBar.style.left = startPercent + "%";
                    visualBar.style.width = (endPercent - startPercent) + "%";
                    visualBar.style.opacity = "1";
                } else visualBar.style.opacity = "0";
            }
        }

        audio.ontimeupdate = () => {
            if (currentIdx === -1) return;
            if (isLooping) {
                if (loopStartTime !== null && loopFinishTime !== null) {
                    if (audio.currentTime >= loopFinishTime) audio.currentTime = loopStartTime;
                } else {
                    if (audio.currentTime >= audio.duration - 0.2) {
                        audio.currentTime = 0;
                        audio.play();
                    }
                }
            }

            if (!isNaN(audio.duration)) {
                const bar = document.getElementById('seek-bar');
                bar.max = audio.duration;
                bar.value = audio.currentTime;
                
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('seek-progress').style.width = progressPercent + '%';

                document.getElementById('time-curr').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
                if (isLooping) updateLoopVisualBar();
            }
        };

        audio.onplay = () => updatePlayButtonIcons();
        audio.onpause = () => updatePlayButtonIcons();
        audio.onended = () => {
            if (!isLooping) handleNext();
            else if (loopStartTime === null || loopFinishTime === null) { audio.currentTime = 0; audio.play(); }
        };

        function handlePlayPause() {
            if (currentIdx === -1) { playTrack(0); return; }
            if (audio.paused) audio.play(); else audio.pause();
        }

        function updatePlayButtonIcons() {
            const miniIcon = document.getElementById('mini-play-btn');
            const fullIcon = document.getElementById('full-play-btn');
            const isPaused = audio.paused;
            miniIcon.className = isPaused ? "fas fa-play" : "fas fa-pause";
            fullIcon.className = isPaused ? "fas fa-play" : "fas fa-pause";
            document.getElementById('full-img').style.transform = isPaused ? "scale(0.85)" : "scale(1.0)";
        }

        function handleNext() { forceNextTrack(); }
        
        // 通常の巻き戻しボタン用（5秒判定あり）
        function handlePrev() { 
            if (currentIdx === -1) return;
            if (audio.currentTime >= 5.0) audio.currentTime = 0;
            else forcePrevTrack();
        }
        
        // スワイプ用（5秒判定無視）
        function forcePrevTrack() {
            if (currentIdx === -1) return;
            playTrack((currentIdx - 1 + tracks.length) % tracks.length);
        }
        // スワイプ用・強制次曲
        function forceNextTrack() {
            if (currentIdx === -1) return;
            playTrack((currentIdx + 1) % tracks.length);
        }
        
        function handleSeek(v) { 
            audio.currentTime = v; 
            if (!isNaN(audio.duration)) {
                const progressPercent = (v / audio.duration) * 100;
                document.getElementById('seek-progress').style.width = progressPercent + '%';
            }
        }

        // ミニプレイヤーのクリックイベントハンドラ（スワイプ時の誤発火防止）
        function handleMiniPlayerClick() {
            if (!isMiniPlayerSwiping) {
                toggleFullPlayer(true);
            }
        }

        function toggleFullPlayer(show) {
            const player = document.getElementById('full-player');
            const mini = document.getElementById('mini-player');
            player.style.transform = show ? "translateY(0)" : "translateY(100%)";
            mini.style.opacity = show ? "0" : "1";
            mini.style.pointerEvents = show ? "none" : "auto";
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' + sec : sec}`;
        }

        // ==========================================
        // スワイプ・アニメーション（紙芝居）関連処理
        // ==========================================

        function setupSwipeEvents() {
            // アートワーク（フルプレイヤー）の横スワイプ
            const artworkWrapper = document.getElementById('artwork-wrapper');
            let startX = 0, startY = 0;
            let isArtworkDragging = false;

            artworkWrapper.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isArtworkDragging = true;
                artworkWrapper.style.transition = 'none';
            }, { passive: true });

            artworkWrapper.addEventListener('touchmove', (e) => {
                if (!isArtworkDragging) return;
                const currentX = e.touches[0].clientX;
                const currentY = e.touches[0].clientY;
                const diffX = currentX - startX;
                const diffY = currentY - startY;

                // 横方向の移動量が縦方向より大きい場合はスワイプと判定
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    e.preventDefault(); // デフォルトのスクロールや縦スワイプ閉じる動作を防止
                    e.stopPropagation(); 
                    artworkWrapper.style.transform = `translateX(${diffX}px)`;
                } else {
                    isArtworkDragging = false; // 縦スワイプとみなし解除
                    artworkWrapper.style.transition = 'transform 0.3s ease';
                    artworkWrapper.style.transform = `translateX(0)`;
                }
            }, { passive: false }); // preventDefaultを有効にするため false

            artworkWrapper.addEventListener('touchend', (e) => {
                if (!isArtworkDragging) return;
                isArtworkDragging = false;
                
                const diffX = e.changedTouches[0].clientX - startX;
                const threshold = window.innerWidth * 0.25;

                if (diffX < -threshold) {
                    // 左スワイプ -> 次の曲
                    artworkWrapper.style.transition = 'transform 0.2s ease';
                    artworkWrapper.style.transform = `translateX(-100vw)`;
                    setTimeout(() => {
                        forceNextTrack();
                        artworkWrapper.style.transition = 'none';
                        artworkWrapper.style.transform = `translateX(100vw)`;
                        void artworkWrapper.offsetWidth; // リフロー強制
                        artworkWrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                        artworkWrapper.style.transform = `translateX(0)`;
                    }, 200);
                } else if (diffX > threshold) {
                    // 右スワイプ -> 前の曲
                    artworkWrapper.style.transition = 'transform 0.2s ease';
                    artworkWrapper.style.transform = `translateX(100vw)`;
                    setTimeout(() => {
                        forcePrevTrack(); // 5秒判定を無視
                        artworkWrapper.style.transition = 'none';
                        artworkWrapper.style.transform = `translateX(-100vw)`;
                        void artworkWrapper.offsetWidth; // リフロー強制
                        artworkWrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                        artworkWrapper.style.transform = `translateX(0)`;
                    }, 200);
                } else {
                    // 元の位置に戻る
                    artworkWrapper.style.transition = 'transform 0.3s ease';
                    artworkWrapper.style.transform = `translateX(0)`;
                }
            });

            // ミニプレイヤーの横スワイプ
            const miniPlayer = document.getElementById('mini-player');
            let mStartX = 0, mStartY = 0;
            let isMiniDragging = false;

            miniPlayer.addEventListener('touchstart', (e) => {
                // ボタンがタップされた場合はスワイプ処理しない
                if (e.target.closest('button')) return;
                
                mStartX = e.touches[0].clientX;
                mStartY = e.touches[0].clientY;
                isMiniDragging = true;
                isMiniPlayerSwiping = false; // 初期化
                miniPlayer.style.transition = 'none';
            }, { passive: true });

            miniPlayer.addEventListener('touchmove', (e) => {
                if (!isMiniDragging) return;
                const currentX = e.touches[0].clientX;
                const currentY = e.touches[0].clientY;
                const diffX = currentX - mStartX;
                const diffY = currentY - mStartY;

                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    e.preventDefault();
                    isMiniPlayerSwiping = true; // スワイプ状態オン（クリック無効化用）
                    miniPlayer.style.transform = `translateX(${diffX}px)`;
                } else if (Math.abs(diffY) > Math.abs(diffX)) {
                    isMiniDragging = false;
                    miniPlayer.style.transition = 'transform 0.3s ease';
                    miniPlayer.style.transform = `translateX(0)`;
                }
            }, { passive: false });

            miniPlayer.addEventListener('touchend', (e) => {
                if (!isMiniDragging) return;
                isMiniDragging = false;
                
                const diffX = e.changedTouches[0].clientX - mStartX;
                const threshold = window.innerWidth * 0.25;

                if (isMiniPlayerSwiping) {
                    if (diffX < -threshold) {
                        // 左スワイプ -> 次の曲
                        miniPlayer.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                        miniPlayer.style.transform = `translateX(-100vw)`;
                        miniPlayer.style.opacity = '0';
                        setTimeout(() => {
                            forceNextTrack();
                            miniPlayer.style.transition = 'none';
                            miniPlayer.style.transform = `translateX(100vw)`;
                            void miniPlayer.offsetWidth;
                            miniPlayer.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease';
                            miniPlayer.style.transform = `translateX(0)`;
                            miniPlayer.style.opacity = '1';
                            setTimeout(() => isMiniPlayerSwiping = false, 50); // クリックガード解除
                        }, 200);
                    } else if (diffX > threshold) {
                        // 右スワイプ -> 前の曲
                        miniPlayer.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                        miniPlayer.style.transform = `translateX(100vw)`;
                        miniPlayer.style.opacity = '0';
                        setTimeout(() => {
                            forcePrevTrack();
                            miniPlayer.style.transition = 'none';
                            miniPlayer.style.transform = `translateX(-100vw)`;
                            void miniPlayer.offsetWidth;
                            miniPlayer.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease';
                            miniPlayer.style.transform = `translateX(0)`;
                            miniPlayer.style.opacity = '1';
                            setTimeout(() => isMiniPlayerSwiping = false, 50);
                        }, 200);
                    } else {
                        // 戻る
                        miniPlayer.style.transition = 'transform 0.3s ease';
                        miniPlayer.style.transform = `translateX(0)`;
                        setTimeout(() => isMiniPlayerSwiping = false, 50);
                    }
                }
            });

            // 画面を閉じるための共通縦スワイプ監視
            function addVerticalSwipeListener(element, onSwipeDown) {
                let sY = 0, isT = false;
                element.addEventListener('touchstart', e => { sY = e.touches[0].clientY; isT = true; }, { passive: true });
                element.addEventListener('touchmove', e => {
                    if (!isT) return;
                    const cY = e.touches[0].clientY;
                    if (cY - sY > 80) { // 下スワイプ判定
                        onSwipeDown();
                        isT = false;
                    }
                }, { passive: true });
                element.addEventListener('touchend', () => { isT = false; });
            }

            // 余白等のスワイプでフルプレイヤーを閉じる（横スワイプ時は発火しない）
            const fullPlayer = document.getElementById('full-player');
            addVerticalSwipeListener(fullPlayer, () => toggleFullPlayer(false));

            const queueView = document.getElementById('queue-view');
            addVerticalSwipeListener(queueView, () => toggleQueueView(false));
        }

        // Media Session API (ロック画面での操作対応)
        function updateMediaSession() {
            if ('mediaSession' in navigator && currentIdx !== -1) {
                const t = tracks[currentIdx];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.title,
                    artist: t.artist,
                    artwork: [
                        { src: t.img, sizes: '96x96', type: 'image/png' },
                        { src: t.img, sizes: '512x512', type: 'image/png' },
                    ]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => forcePrevTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => forceNextTrack());
            }
        }

        // アプリの初期化
        initLibrary();
        setupSwipeEvents();
    </script>
</body>
</html>
