<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jmusic</title>
    
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="img/iconcheer.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .player-view { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        
        .seek-container { position: relative; height: 28px; display: flex; align-items: center; cursor: pointer; }
        .seek-track-bg { position: absolute; left: 0; right: 0; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; top: 50%; transform: translateY(-50%); pointer-events: none; overflow: hidden; transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .seek-progress { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: #fff; border-radius: 4px; pointer-events: none; }
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; height: 100%; position: absolute; z-index: 10; margin: 0; cursor: pointer; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 100%; background: transparent; border: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 28px; width: 28px; border-radius: 50%; background: transparent; cursor: pointer; }

        #loop-visual-bar { position: absolute; height: 6px; background: rgba(239, 68, 68, 0.35); border-radius: 3px; z-index: 5; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0; transition: opacity 0.3s ease, transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .loop-marker { position: absolute; width: 3px; height: 14px; background: #ef4444; border-radius: 2px; z-index: 6; top: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.3s ease, transform 0.2s ease; box-shadow: 0 0 6px rgba(0,0,0,0.6); }

        .seek-container:active .seek-track-bg, .seek-container:active #loop-visual-bar { transform: translateY(-50%) scaleY(1.4); }
        .seek-container:active .loop-marker { transform: translate(-50%, -50%) scaleY(1.2); }

        .active-song-item { background: rgba(255, 255, 255, 0.1); border-left: 3px solid #ef4444; }
        .footer-icon-btn { transition: all 0.2s ease; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .footer-icon-btn:active { transform: scale(0.9); opacity: 0.6; }

        .control-btn { padding: 6px 14px; border-radius: 999px; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.05em; }
        .control-btn.active { background: #fff; color: #000; border-color: #fff; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sortable-ghost { opacity: 0.4; background: rgba(255,255,255,0.1); }
        .sortable-drag { background: #18181b; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); z-index: 50; }
        
        .slide-out-left { transform: translateX(-100%); opacity: 0; }
        
        .modal-enter { opacity: 1 !important; pointer-events: auto !important; }
        .modal-enter .modal-content { transform: scale(1) !important; }

        /* Apple Music風 歌詞スタイル */
        .lyric-line {
            font-size: 1.75rem;
            line-height: 1.4;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.35);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform-origin: left center;
            cursor: pointer;
            padding: 8px 0;
            filter: blur(1px);
        }
        .lyric-line:active {
            opacity: 0.7;
        }
        .lyric-active {
            color: rgba(255, 255, 255, 1);
            transform: scale(1.05);
            filter: blur(0px);
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        /* 歌詞ビューの背景ぼかし（フルプレイヤーの背景を透かせるため） */
        #lyrics-view {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- 共通のダイナミックな背景（フルプレイヤー＆歌詞用） -->
    <div id="bg-blur" class="fixed inset-0 z-[-1] opacity-40 blur-[80px] scale-150 transition-all duration-1000"></div>

    <!-- ライブラリ画面 -->
    <main class="flex-1 overflow-y-auto px-5 pt-16 pb-32">
        <h1 class="text-3xl font-bold mb-6">ライブラリ</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div onclick="openView('view-playlists')" class="glass p-4 rounded-2xl flex flex-col gap-2 active:scale-95 transition-transform cursor-pointer">
                <i class="fas fa-music text-red-500 text-2xl"></i>
                <span class="font-bold">プレイリスト</span>
            </div>
            <div onclick="openView('view-favorites')" class="glass p-4 rounded-2xl flex flex-col gap-2 active:scale-95 transition-transform cursor-pointer">
                <i class="fas fa-heart text-pink-500 text-2xl"></i>
                <span class="font-bold">お気に入り</span>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 text-white/60">すべての曲</h2>
        <div id="song-list" class="space-y-1"></div>
    </main>

    <!-- お気に入り画面 -->
    <div id="view-favorites" class="fixed inset-0 z-[45] bg-black flex flex-col transition-transform translate-x-full duration-300">
        <div class="flex items-center justify-between px-4 h-16 shrink-0 bg-black/80 backdrop-blur-md sticky top-0 z-10">
            <button onclick="closeView('view-favorites')" class="text-red-500 font-semibold flex items-center gap-1 w-20"><i class="fas fa-chevron-left"></i> 戻る</button>
            <h2 class="font-bold text-lg">お気に入り</h2>
            <div class="w-20"></div>
        </div>
        <div id="favorites-list" class="flex-1 overflow-y-auto px-4 pb-24 space-y-1"></div>
    </div>

    <!-- プレイリスト一覧画面 -->
    <div id="view-playlists" class="fixed inset-0 z-[45] bg-black flex flex-col transition-transform translate-x-full duration-300">
        <div class="flex items-center justify-between px-4 h-16 shrink-0 bg-black/80 backdrop-blur-md sticky top-0 z-10">
            <button onclick="closeView('view-playlists')" class="text-red-500 font-semibold flex items-center gap-1 w-20"><i class="fas fa-chevron-left"></i> 戻る</button>
            <h2 class="font-bold text-lg">プレイリスト</h2>
            <div class="w-20"></div>
        </div>
        <div class="px-5 mb-6 mt-2">
            <button onclick="createNewPlaylist()" class="w-full py-3 bg-red-500/20 text-red-500 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <i class="fas fa-plus"></i> 新規プレイリスト
            </button>
        </div>
        <div id="playlists-list" class="flex-1 overflow-y-auto px-5 pb-24 grid grid-cols-2 gap-4 place-content-start"></div>
    </div>

    <!-- プレイリスト詳細画面 -->
    <div id="view-playlist-detail" class="fixed inset-0 z-[46] bg-black flex flex-col transition-transform translate-x-full duration-300">
        <div class="flex items-center justify-between px-4 h-16 shrink-0 bg-black/80 backdrop-blur-md sticky top-0 z-10">
            <button onclick="closeView('view-playlist-detail')" class="text-red-500 font-semibold flex items-center gap-1 w-20"><i class="fas fa-chevron-left"></i> 戻る</button>
            <button id="btn-playlist-edit" onclick="togglePlaylistEdit()" class="text-red-500 font-semibold w-20 text-right text-sm">編集</button>
        </div>
        <div class="flex-1 overflow-y-auto pb-24">
            <div class="px-6 py-4 flex flex-col items-center">
                <div id="detail-cover-container" class="relative w-48 h-48 bg-white/10 rounded-2xl shadow-2xl mb-6 flex items-center justify-center overflow-hidden cursor-default transition-all" onclick="handlePlaylistCoverTap()">
                    <div id="detail-cover-inner" class="w-full h-full flex items-center justify-center">
                        <i class="fas fa-music text-6xl text-white/20"></i>
                    </div>
                    <div id="detail-cover-edit-overlay" class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 transition-opacity pointer-events-none">
                        <i class="fas fa-camera text-3xl text-white mb-2"></i>
                        <span class="text-xs font-bold text-white shadow-sm">画像を変更</span>
                    </div>
                </div>
                <input type="file" id="edit-playlist-cover-input" accept="image/*" class="hidden" onchange="processImageSelection(event, updateCurrentPlaylistCover)">
                
                <h1 id="detail-playlist-title" class="text-2xl font-bold mb-2 text-center px-4 w-full truncate">Playlist Name</h1>
                <div class="flex gap-4 w-full mt-4" id="playlist-controls">
                    <button onclick="playPlaylist()" class="flex-1 bg-white/10 py-3 rounded-xl font-bold flex justify-center items-center gap-2 active:bg-white/20 transition-colors">
                        <i class="fas fa-play"></i> 再生
                    </button>
                    <button onclick="openTrackSelector()" class="flex-1 bg-white/10 py-3 rounded-xl font-bold flex justify-center items-center gap-2 active:bg-white/20 transition-colors text-red-500">
                        <i class="fas fa-plus"></i> 曲を追加
                    </button>
                </div>
            </div>
            <div id="playlist-detail-list" class="space-y-0 mt-4 overflow-x-hidden"></div>
        </div>
    </div>

    <!-- 中央配置モーダル群 -->
    <div id="modal-new-playlist" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('modal-new-playlist')"></div>
        <div class="modal-content bg-zinc-800 rounded-2xl w-[85%] max-w-sm p-6 relative z-10 transform scale-95 transition-transform duration-300 flex flex-col items-center shadow-2xl border border-white/10">
            <h3 class="font-bold text-lg mb-4">新規プレイリスト</h3>
            <div class="relative w-32 h-32 mb-4 group cursor-pointer" onclick="document.getElementById('new-playlist-cover-input').click()">
                <img id="new-playlist-cover-preview" src="" class="absolute inset-0 w-full h-full object-cover rounded-xl shadow-lg hidden">
                <div id="new-playlist-cover-placeholder" class="absolute inset-0 flex flex-col items-center justify-center rounded-xl bg-white/10 shadow-lg border-2 border-dashed border-white/20">
                    <i class="fas fa-camera text-2xl text-white/50 mb-1"></i>
                    <span class="text-xs text-white/50">画像を選択</span>
                </div>
            </div>
            <input type="file" id="new-playlist-cover-input" accept="image/*" class="hidden" onchange="processImageSelection(event, setTempNewPlaylistCover)">
            <input type="text" id="new-playlist-name" placeholder="プレイリスト名" class="w-full bg-black/30 border border-white/20 rounded-xl px-4 py-3 text-white mb-6 focus:outline-none focus:border-red-500 focus:bg-black/60 text-center transition-colors">
            <div class="flex w-full gap-3">
                <button onclick="closeModal('modal-new-playlist')" class="flex-1 py-3 rounded-xl bg-white/10 font-bold active:bg-white/20 transition-colors">キャンセル</button>
                <button onclick="submitNewPlaylist()" class="flex-1 py-3 rounded-xl bg-red-500 font-bold text-white active:bg-red-600 transition-colors shadow-lg shadow-red-500/30">作成</button>
            </div>
        </div>
    </div>

    <div id="modal-delete-playlist" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('modal-delete-playlist')"></div>
        <div class="modal-content bg-zinc-800 rounded-2xl w-[85%] max-w-sm p-6 relative z-10 transform scale-95 transition-transform duration-300 flex flex-col items-center shadow-2xl border border-white/10">
            <h3 class="font-bold text-lg mb-2">プレイリストの削除</h3>
            <p class="text-white/70 text-sm text-center mb-6">このプレイリストを削除してもよろしいですか？この操作は取り消せません。</p>
            <div class="flex w-full gap-3">
                <button onclick="closeModal('modal-delete-playlist')" class="flex-1 py-3 rounded-xl bg-white/10 font-bold active:bg-white/20 transition-colors">キャンセル</button>
                <button onclick="confirmDeletePlaylist()" class="flex-1 py-3 rounded-xl bg-red-500 font-bold text-white active:bg-red-600 transition-colors shadow-lg shadow-red-500/30">削除</button>
            </div>
        </div>
    </div>

    <div id="modal-track-options" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('modal-track-options')"></div>
        <div class="modal-content bg-zinc-800 rounded-2xl w-[85%] max-w-sm p-6 relative z-10 transform scale-95 transition-transform duration-300 flex flex-col gap-2 shadow-2xl border border-white/10">
            <div class="flex items-center gap-4 pb-4 border-b border-white/10 mb-2">
                <img id="opt-img" src="" class="w-12 h-12 rounded object-cover shadow">
                <div class="flex-1 min-w-0">
                    <div id="opt-title" class="font-bold truncate">Title</div>
                    <div id="opt-artist" class="text-xs text-white/50 truncate">Artist</div>
                </div>
            </div>
            <button onclick="optToggleFavorite()" class="flex items-center gap-4 py-3 active:bg-white/5 rounded-xl px-2 transition-colors">
                <i id="opt-fav-icon" class="far fa-heart text-xl w-6 text-center"></i>
                <span id="opt-fav-text" class="font-semibold text-base">お気に入りに追加</span>
            </button>
            <button onclick="optAddToPlaylist()" class="flex items-center gap-4 py-3 active:bg-white/5 rounded-xl px-2 transition-colors">
                <i class="fas fa-list text-xl w-6 text-center text-white/70"></i>
                <span class="font-semibold text-base">プレイリストに追加...</span>
            </button>
            <div class="mt-2 pt-2 border-t border-white/10">
                <button onclick="closeModal('modal-track-options')" class="w-full py-3 font-bold text-white/60 active:text-white transition-colors">閉じる</button>
            </div>
        </div>
    </div>

    <div id="modal-playlist-select" class="fixed inset-0 z-[105] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('modal-playlist-select')"></div>
        <div class="modal-content bg-zinc-800 rounded-2xl w-[85%] max-w-sm p-6 relative z-10 transform scale-95 transition-transform duration-300 flex flex-col shadow-2xl border border-white/10 max-h-[70vh]">
            <h3 class="font-bold text-lg mb-4 text-center">プレイリストに追加</h3>
            <div id="select-playlist-list" class="flex-1 overflow-y-auto space-y-1 mb-4 hide-scrollbar"></div>
            <button onclick="closeModal('modal-playlist-select')" class="w-full py-3 rounded-xl bg-white/10 font-bold active:bg-white/20 transition-colors">キャンセル</button>
        </div>
    </div>

    <div id="modal-track-selector" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onclick="saveTrackSelection()"></div>
        <div class="modal-content bg-zinc-900 rounded-2xl w-[90%] h-[80vh] relative z-10 transform scale-95 transition-transform duration-300 flex flex-col shadow-2xl border border-white/10 overflow-hidden">
            <div class="flex items-center justify-between px-4 h-14 shrink-0 bg-zinc-800/50 border-b border-white/10">
                <button onclick="closeModal('modal-track-selector')" class="text-white font-semibold w-16 text-left text-sm">ｷｬﾝｾﾙ</button>
                <h2 class="font-bold text-md">曲を追加</h2>
                <button onclick="saveTrackSelection()" class="text-red-500 font-bold w-16 text-right text-sm">完了</button>
            </div>
            <div id="selector-track-list" class="flex-1 overflow-y-auto px-4 py-2 space-y-1 hide-scrollbar"></div>
        </div>
    </div>

    <!-- ミニプレイヤー -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 h-16 glass rounded-2xl flex items-center px-3 z-[48] shadow-2xl transition-opacity duration-300" onclick="handleMiniPlayerClick()">
        <div id="mini-swipe-area" class="flex-1 h-full flex items-center overflow-hidden mr-2 relative cursor-pointer">
            <div id="mini-content-wrapper" class="flex items-center w-full">
                <img id="mini-img" src="img/iconcheer.png" class="w-11 h-11 rounded-lg object-cover bg-white/10 shrink-0" alt="cover" onerror="this.src='https://via.placeholder.com/100x100.png?text=JOSO';">
                <div class="flex-1 ml-3 min-w-0">
                    <div id="mini-title" class="text-sm font-semibold truncate">曲を選択してください</div>
                    <div id="mini-artist" class="text-[11px] text-white/40 truncate">-</div>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4 px-2 shrink-0" onclick="event.stopPropagation()">
            <button onclick="handlePlayPause()" class="w-8 h-8 flex items-center justify-center"><i id="mini-play-btn" class="fas fa-play text-xl"></i></button>
            <button onclick="forceNextTrack()" class="w-8 h-8 flex items-center justify-center"><i class="fas fa-forward text-lg"></i></button>
        </div>
    </div>

    <!-- フルプレイヤー画面 -->
    <div id="full-player" class="fixed inset-0 z-[50] player-view translate-y-full flex flex-col px-8 pb-4 pt-4 overflow-hidden">
        <div class="absolute inset-0 bg-black z-[-3]"></div>
        <img id="full-player-bg-img" src="" class="absolute inset-0 w-full h-full object-cover z-[-2] blur-[70px] scale-[1.3] opacity-60 saturate-[1.2] transition-all duration-700 pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/50 to-black/90 z-[-1] pointer-events-none"></div>

        <div class="w-full flex justify-center py-4 relative z-10" onclick="toggleFullPlayer(false)">
            <div class="w-10 h-1.5 bg-white/30 rounded-full"></div>
        </div>

        <div id="full-img-container" class="flex-1 flex items-center justify-center overflow-hidden w-full mb-8 relative z-10">
            <div id="artwork-wrapper" class="w-full h-full flex items-center justify-center">
                <img id="full-img" src="img/iconcheer.png" class="w-full max-w-[320px] aspect-square rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-all duration-500 scale-90" alt="cover" onerror="this.src='https://via.placeholder.com/500x500.png?text=JOSO';">
            </div>
        </div>

        <div class="mb-6 relative z-10">
            <div class="w-full">
                <h2 id="full-title" class="text-2xl font-bold truncate">曲名</h2>
                <p id="full-artist" class="text-xl text-white/60 truncate">アーティスト</p>
            </div>
            
            <div class="flex items-center justify-between mt-4 flex-wrap gap-y-3">
                <div class="flex items-center gap-2 flex-wrap">
                    <button id="btn-loop-toggle" onclick="toggleLoopMode()" class="control-btn">LOOP</button>
                    <button id="btn-loop-start" onclick="setLoopStart()" class="control-btn">START</button>
                    <button id="btn-loop-finish" onclick="setLoopFinish()" class="control-btn">FINISH</button>
                </div>
                <div class="flex items-center gap-3 ml-auto shrink-0">
                    <div id="loop-indicator" class="text-[9px] text-red-500 font-bold opacity-0 transition-opacity text-right leading-tight">LOOP<br>ACTIVE</div>
                    <button id="btn-favorite" onclick="toggleFavoriteCurrent()" class="text-2xl text-white/70 transition-all active:scale-75 p-2 flex items-center justify-center shrink-0">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-8 relative z-10">
            <div class="seek-container">
                <div class="seek-track-bg"><div id="seek-progress" class="seek-progress"></div></div>
                <div id="loop-visual-bar"></div>
                <div id="loop-marker-start" class="loop-marker"></div>
                <div id="loop-marker-finish" class="loop-marker"></div>
                <input type="range" id="seek-bar" class="w-full" value="0" step="0.1" oninput="handleSeek(this.value)">
            </div>
            <div class="flex justify-between text-[11px] font-bold text-white/50 mt-2">
                <span id="time-curr">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="flex justify-around items-center mb-6 relative z-10">
            <button onclick="handlePrev()" class="text-3xl active:scale-90 transition-transform"><i class="fas fa-backward"></i></button>
            <button onclick="handlePlayPause()" class="text-6xl w-24 active:scale-95 transition-transform"><i id="full-play-btn" class="fas fa-play"></i></button>
            <button onclick="forceNextTrack()" class="text-3xl active:scale-90 transition-transform"><i class="fas fa-forward"></i></button>
        </div>

        <div id="full-footer" class="flex justify-around items-center px-4 text-white/50 text-xl mb-0 h-16 w-full relative z-10">
            <button onclick="onQueueButtonClick()" class="footer-icon-btn text-white" id="btn-queue-toggle"><i class="fas fa-list-ul"></i></button>
            <button onclick="onLyricsButtonClick()" class="footer-icon-btn" id="btn-lyrics-toggle"><i class="fas fa-quote-right"></i></button>
        </div>
    </div>

    <!-- === Apple Music風 歌詞画面 === -->
    <div id="lyrics-view" class="fixed inset-0 z-[55] player-view translate-y-full flex flex-col overflow-hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-2xl z-[-1]"></div>
        
        <div class="flex justify-between items-center h-20 px-6 shrink-0 relative z-10 bg-gradient-to-b from-black/60 to-transparent pt-4">
            <button onclick="toggleLyricsView(false)" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full text-white/80 active:scale-95 transition-transform backdrop-blur-md">
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="font-bold text-sm tracking-widest text-white/80">LYRICS</div>
            <div class="w-10"></div>
        </div>
        
        <!-- 歌詞表示領域 -->
        <div id="lyrics-container" class="flex-1 overflow-y-auto px-8 pb-48 pt-10 hide-scrollbar space-y-6 relative z-10 scroll-smooth">
            <!-- JavaScriptで動的に生成 -->
        </div>
    </div>

    <!-- キュー画面 -->

        function processImageSelection(event, callback) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 300;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = MAX_SIZE; canvas.height = MAX_SIZE;
                    const ctx = canvas.getContext('2d');
                    const offsetX = (width - MAX_SIZE) / 2; const offsetY = (height - MAX_SIZE) / 2;
                    ctx.drawImage(img, -offsetX, -offsetY, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.8));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // ====== 歌詞（LRC）パーサーと同期ロジック ======
        async function loadLyrics(trackId, lrcPath) {
            currentLyrics = [];
            currentLyricIndex = -1;
            const container = document.getElementById('lyrics-container');
            container.innerHTML = '<div class="text-white/50 text-center mt-20 font-bold text-xl">読み込み中...</div>';

            if (!lrcPath) {
                container.innerHTML = '<div class="text-white/30 text-center mt-20 font-bold text-xl">歌詞がありません</div>';
                return;
            }

            try {
                const response = await fetch(lrcPath);
                if (!response.ok) throw new Error('File not found or CORS error');
                const text = await response.text();
                currentLyrics = parseLRC(text);
                renderLyrics();
            } catch (error) {
                console.warn('歌詞の読み込みエラー:', error);
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center mt-20 opacity-50">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <div class="font-bold text-xl mb-2">現在歌詞はご覧になれません</div>
                        <div class="text-xs text-center px-4 leading-relaxed max-w-sm">
                            <code class="bg-white/10 px-1 rounded">${lrcPath}</code> が見つからないか、ブラウザのセキュリティ制限(CORS)によりブロックされました。
                        </div>
                    </div>
                `;
            }
        }

        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const lyrics = [];
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            
            for (let line of lines) {
                const match = timeReg.exec(line);
                if (match) {
                    const min = parseInt(match[1], 10);
                    const sec = parseInt(match[2], 10);
                    const ms = parseInt(match[3], 10);
                    const time = min * 60 + sec + (ms / (match[3].length === 3 ? 1000 : 100));
                    const text = line.replace(timeReg, '').trim();
                    if (text) { lyrics.push({ time, text }); }
                }
            }
            return lyrics;
        }

        // --- プレイヤー制御・ループ・スワイプ処理 ---
        function setLoopStart() { loopStartTime = audio.currentTime; isLooping = true; updateLoopUI(); }

        function toggleLoopMode() { if (isLooping) resetLoopState(); else isLooping = true; updateLoopUI(); }
        function resetLoopState() { isLooping = false; loopStartTime = null; loopFinishTime = null; updateLoopUI(); }
        function updateLoopUI() {
            const btnToggle = document.getElementById('btn-loop-toggle'); const btnStart = document.getElementById('btn-loop-start'); const btnFinish = document.getElementById('btn-loop-finish'); const indicator = document.getElementById('loop-indicator'); const visualBar = document.getElementById('loop-visual-bar'); const markerStart = document.getElementById('loop-marker-start'); const markerFinish = document.getElementById('loop-marker-finish');

            else { indicator.style.opacity = "0"; visualBar.style.opacity = "0"; markerStart.style.opacity = "0"; markerFinish.style.opacity = "0"; }
        }
        function updateLoopVisualBar() {
            const visualBar = document.getElementById('loop-visual-bar'); const markerStart = document.getElementById('loop-marker-start'); const markerFinish = document.getElementById('loop-marker-finish');

                if (loopStartTime !== null && loopFinishTime !== null) { const startPercent = (loopStartTime / audio.duration) * 100; const endPercent = (loopFinishTime / audio.duration) * 100; visualBar.style.left = startPercent + "%"; visualBar.style.width = (endPercent - startPercent) + "%"; visualBar.style.opacity = "1"; } else visualBar.style.opacity = "0";
            }
        }

        audio.ontimeupdate = () => {

        // キューリストの描画とドラッグ＆ドロップ（Sortable.js）の設定
        function renderQueueList() {
            const container = document.getElementById('queue-list');

        function formatTime(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' + sec : sec}`; }

        function setupSwipeEvents() {
            const artworkWrapper = document.getElementById('artwork-wrapper');
            let startX = 0, startY = 0, isArtworkDragging = false;
            artworkWrapper.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; isArtworkDragging = true; artworkWrapper.style.transition = 'none'; }, { passive: true });

                if (!isArtworkDragging) return; const diffX = e.touches[0].clientX - startX; const diffY = e.touches[0].clientY - startY;
                if (Math.abs(diffX) > Math.abs(diffY)) { e.preventDefault(); e.stopPropagation(); artworkWrapper.style.transform = `translateX(${diffX}px)`; } 
                else { isArtworkDragging = false; artworkWrapper.style.transition = 'transform 0.3s ease'; artworkWrapper.style.transform = `translateX(0)`; }
            }, { passive: false });
            artworkWrapper.addEventListener('touchend', (e) => {
                if (!isArtworkDragging) return; isArtworkDragging = false; const diffX = e.changedTouches[0].clientX - startX; const threshold = window.innerWidth * 0.25;
                if (diffX < -threshold) {
                    artworkWrapper.style.transition = 'transform 0.2s ease'; artworkWrapper.style.transform = `translateX(-100vw)`;

                } else if (diffX > threshold) {
                    artworkWrapper.style.transition = 'transform 0.2s ease'; artworkWrapper.style.transform = `translateX(100vw)`;
                    setTimeout(() => { forcePrevTrack(); artworkWrapper.style.transition = 'none'; artworkWrapper.style.transform = `translateX(-100vw)`; void artworkWrapper.offsetWidth; artworkWrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)'; artworkWrapper.style.transform = `translateX(0)`; }, 200);
                } else { artworkWrapper.style.transition = 'transform 0.3s ease'; artworkWrapper.style.transform = `translateX(0)`; }
            });

            const miniSwipeArea = document.getElementById('mini-swipe-area'); const miniContentWrapper = document.getElementById('mini-content-wrapper');

            miniSwipeArea.addEventListener('touchstart', (e) => { mStartX = e.touches[0].clientX; mStartY = e.touches[0].clientY; isMiniDragging = true; isMiniPlayerSwiping = false; miniContentWrapper.style.transition = 'none'; }, { passive: true });
            miniSwipeArea.addEventListener('touchmove', (e) => {
                if (!isMiniDragging) return; const diffX = e.touches[0].clientX - mStartX; const diffY = e.touches[0].clientY - mStartY;
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) { e.preventDefault(); isMiniPlayerSwiping = true; miniContentWrapper.style.transform = `translateX(${diffX}px)`; } 
                else if (Math.abs(diffY) > Math.abs(diffX)) { isMiniDragging = false; miniContentWrapper.style.transition = 'transform 0.3s ease'; miniContentWrapper.style.transform = `translateX(0)`; }
            }, { passive: false });
            miniSwipeArea.addEventListener('touchend', (e) => {
                if (!isMiniDragging) return; isMiniDragging = false; const diffX = e.changedTouches[0].clientX - mStartX; const threshold = miniSwipeArea.offsetWidth * 0.3;
                if (isMiniPlayerSwiping) {
                    if (diffX < -threshold) {
                        miniContentWrapper.style.transition = 'transform 0.2s ease, opacity 0.2s ease'; miniContentWrapper.style.transform = `translateX(-100%)`; miniContentWrapper.style.opacity = '0';
                        setTimeout(() => { forceNextTrack(); miniContentWrapper.style.transition = 'none'; miniContentWrapper.style.transform = `translateX(100%)`; void miniContentWrapper.offsetWidth; miniContentWrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease'; miniContentWrapper.style.transform = `translateX(0)`; miniContentWrapper.style.opacity = '1'; setTimeout(() => isMiniPlayerSwiping = false, 50); }, 200);
                    } else if (diffX > threshold) {
                        miniContentWrapper.style.transition = 'transform 0.2s ease, opacity 0.2s ease'; miniContentWrapper.style.transform = `translateX(100%)`; miniContentWrapper.style.opacity = '0';
                        setTimeout(() => { forcePrevTrack(); miniContentWrapper.style.transition = 'none'; miniContentWrapper.style.transform = `translateX(-100%)`; void miniContentWrapper.offsetWidth; miniContentWrapper.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease'; miniContentWrapper.style.transform = `translateX(0)`; miniContentWrapper.style.opacity = '1'; setTimeout(() => isMiniPlayerSwiping = false, 50); }, 200);
                    } else { miniContentWrapper.style.transition = 'transform 0.3s ease'; miniContentWrapper.style.transform = `translateX(0)`; setTimeout(() => isMiniPlayerSwiping = false, 50); }
                }
            });

            function addVerticalSwipeListener(element, onSwipeDown) {
                let sY = 0, sX = 0, isT = false;
                element.addEventListener('touchstart', e => { sY = e.touches[0].clientY; sX = e.touches[0].clientX; isT = true; }, { passive: true });
                element.addEventListener('touchmove', e => {
                    if (!isT) return; const cY = e.touches[0].clientY, cX = e.touches[0].clientX;
                    if (Math.abs(cX - sX) > Math.abs(cY - sY)) return;
                    const scrollable = e.target.closest('.overflow-y-auto'); if (scrollable && scrollable.scrollTop > 0) return;
                    if (cY - sY > 80) { onSwipeDown(); isT = false; }
                }, { passive: true });
                element.addEventListener('touchend', () => { isT = false; });
            }

            addVerticalSwipeListener(document.getElementById('full-player'), () => toggleFullPlayer(false));
            addVerticalSwipeListener(document.getElementById('queue-view'), () => toggleQueueView(false));
            addVerticalSwipeListener(document.getElementById('lyrics-view'), () => toggleLyricsView(false));
        }

        function updatePositionState() {
            if ('mediaSession' in navigator && !isNaN(audio.duration) && audio.duration > 0) {
                navigator.mediaSession.setPositionState({
                    duration: audio.duration,
                    playbackRate: audio.playbackRate || 1,
                    position: audio.currentTime
                });
            }
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator && currentTrack) {
                const t = currentTrack;
                navigator.mediaSession.metadata = new MediaMetadata({ 
                    title: t.title, 
                    artist: t.artist, 
                    artwork: [ 
                        { src: t.img, sizes: '96x96', type: 'image/png' }, 
                        { src: t.img, sizes: '512x512', type: 'image/png' }
                    ] 
                });
                
                // 再生・停止（余計な再読み込み処理を削除し、純粋にplay/pauseを実行）
                navigator.mediaSession.setActionHandler('play', () => { 
                    audio.play().catch(e => console.warn("Play error:", e)); 
                    updatePositionState();
                }); 
                navigator.mediaSession.setActionHandler('pause', () => { 
                    audio.pause(); 
                    updatePositionState();
                });

                // スキップ・巻き戻し（確実に前の曲・次の曲へ飛ぶように再設定）
                navigator.mediaSession.setActionHandler('previoustrack', () => {
                    forcePrevTrack();
                }); 
                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    forceNextTrack();
                });

                // 再生バーのシーク（変更なし）
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    if (details.fastSeek && 'fastSeek' in audio) {
                        audio.fastSeek(details.seekTime);
                    } else {
                        audio.currentTime = details.seekTime;
                    }
                    updatePositionState();
                });
            }
        }

        initLibrary();
        setupSwipeEvents();
    </script>
</body>
</html>
